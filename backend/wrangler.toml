name = "work-progress-api"
main = "worker.js"
compatibility_date = "2024-09-01"

# KV namespace（部署時用 wrangler 建立後，把 id 填到這裡）
kv_namespaces = [
  { binding = "KV", id = "cad8d375df01471daa4768c7ddd0229e" }
]

# 每天兩個固定 UTC 時點觸發，實際「星期」由 worker 用台灣時間判斷（避免 cron 星期語意歧義）
# 12:00 UTC = 台灣 20:00（給週一、二）；09:30 UTC = 台灣 17:30（給週三、四、五）
# UTC 時間（台灣 = UTC+8）
# 12:00→20:00 提醒(一二)｜12:30→20:30 未更新檢查(一二)
# 09:30→17:30 提醒(三四五)｜10:00→18:00 未更新檢查(三四五)
# 13:00→21:00 同步 + 記錄每日完成度
[triggers]
crons = [
  "0 12 * * *",
  "30 12 * * *",
  "30 9 * * *",
  "0 10 * * *",
  "0 13 * * *",
]
