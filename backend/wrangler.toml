name = "work-progress-api"
main = "worker.js"
compatibility_date = "2024-09-01"

# KV namespace（部署時用 wrangler 建立後，把 id 填到這裡）
kv_namespaces = [
  { binding = "KV", id = "cad8d375df01471daa4768c7ddd0229e" }
]

# Cron 以 UTC 計（台灣 = UTC+8）。免費方案上限 5 個。
# 提醒：週一二 20:00 台灣 = 12:00 UTC；週三四五 17:30 台灣 = 09:30 UTC
# （換週改由「開頁面時自動檢查」+ 發提醒時順手檢查，不另佔 cron）
[triggers]
crons = [
  "0 12 * * 1",
  "0 12 * * 2",
  "30 9 * * 3",
  "30 9 * * 4",
  "30 9 * * 5",
]
