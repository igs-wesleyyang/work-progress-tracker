<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>市場組工作進度追蹤</title>
<style>
  :root{
    --bg:#f6f7f9; --card:#fff; --line:#e4e7ec; --txt:#1f2430; --muted:#6b7280;
    --us:#2563eb; --us-bg:#e8f0fe; --asia:#0f9d77; --asia-bg:#dcf5ec;
    --ok:#16a34a; --ok-bg:#dcfce7; --doing:#d97706; --doing-bg:#fef3c7; --none:#9ca3af; --none-bg:#f1f3f5;
    --radius:12px;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#15171c; --card:#1f232b; --line:#333a45; --txt:#e6e8ec; --muted:#9aa3af;
      --us-bg:#1e2c4a; --asia-bg:#143a30; --ok-bg:#16361f; --doing-bg:#3a2e10; --none-bg:#262a32; }
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--bg);color:var(--txt);font-size:15px;line-height:1.5}
  header{position:sticky;top:0;z-index:5;background:var(--card);border-bottom:1px solid var(--line);
    padding:14px 20px;display:flex;flex-wrap:wrap;gap:12px 24px;align-items:center;justify-content:space-between}
  h1{font-size:18px;margin:0;font-weight:600}
  .cycle{font-size:13px;color:var(--muted)}
  .overall{display:flex;align-items:center;gap:10px;font-size:13px}
  .bigpct{font-size:22px;font-weight:700}
  .wrap{max-width:1100px;margin:0 auto;padding:18px 20px 60px}
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
  .toolbar button,.toolbar select{font:inherit;padding:7px 12px;border:1px solid var(--line);
    background:var(--card);color:var(--txt);border-radius:8px;cursor:pointer}
  .toolbar button:hover{border-color:var(--muted)}
  .chip{padding:4px 10px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--line);background:var(--card)}
  .chip.active{background:var(--txt);color:var(--bg);border-color:var(--txt)}
  .person{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
  .phead{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none}
  .avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-weight:600;font-size:13px;color:#fff;flex:0 0 auto}
  .pname{font-weight:600}
  .teamtag{font-size:11px;padding:2px 8px;border-radius:6px}
  .teamtag.us{background:var(--us-bg);color:var(--us)} .teamtag.asia{background:var(--asia-bg);color:var(--asia)}
  .pmeta{margin-left:auto;display:flex;align-items:center;gap:14px;font-size:13px;color:var(--muted)}
  .pbar{width:120px;height:8px;border-radius:5px;background:var(--none-bg);overflow:hidden}
  .pbar>i{display:block;height:100%;background:var(--us)}
  table{width:100%;border-collapse:collapse}
  .items{border-top:1px solid var(--line)}
  th,td{text-align:left;padding:9px 12px;font-size:13.5px;border-top:1px solid var(--line);vertical-align:top}
  th{font-size:12px;color:var(--muted);font-weight:500;background:transparent}
  .tag{font-size:11px;padding:2px 7px;border-radius:6px;background:var(--none-bg);color:var(--muted);white-space:nowrap}
  .title{font-weight:500}
  .note{color:var(--muted);font-size:12px;margin-top:2px}
  .status{font-size:11px;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .s0{background:var(--none-bg);color:var(--none)} .s1{background:var(--doing-bg);color:var(--doing)} .s2{background:var(--ok-bg);color:var(--ok)}
  .prog{display:flex;align-items:center;gap:8px}
  .prog input[type=range]{width:90px}
  .prog input[type=number]{width:52px;font:inherit;padding:3px 5px;border:1px solid var(--line);border-radius:6px;background:var(--bg);color:var(--txt)}
  .upd{font-size:11px;color:var(--muted);white-space:nowrap}
  .hrs{width:46px;font:inherit;padding:3px 5px;border:1px solid var(--line);border-radius:6px;background:var(--bg);color:var(--txt)}
  .colH{width:60px} .colT{width:70px} .colP{width:170px} .colS{width:70px} .colU{width:84px}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:20px}
  .hint{background:var(--doing-bg);color:var(--doing);font-size:12px;padding:8px 12px;border-radius:8px;margin-bottom:14px}
  .items.hide{display:none}
</style>
</head>
<body>
<header>
  <div>
    <h1>市場組工作進度追蹤</h1>
    <div class="cycle" id="cycle"></div>
  </div>
  <div class="overall">
    <span>全組完成度</span>
    <div class="pbar" style="width:160px"><i id="ovbar"></i></div>
    <span class="bigpct" id="ovpct">0%</span>
  </div>
</header>

<div class="wrap">
  <div class="hint">進度即時共用：任何人更新，其他人重新整理（或每 20 秒自動同步）就看得到。每週三 00:00 自動換頁、上週存入「歷史週報」。項目每天 21:00 自動從來源表更新，也可按右側按鈕手動重讀（皆保留已填進度）。</div>
  <div class="legend" style="display:flex;gap:18px;align-items:center;margin-bottom:14px;font-size:13px;color:var(--txt);flex-wrap:wrap">
    <span style="font-weight:500">團隊顏色：</span>
    <span style="display:inline-flex;align-items:center;gap:6px"><span style="width:13px;height:13px;border-radius:3px;background:#2563eb;display:inline-block"></span>美國團隊</span>
    <span style="display:inline-flex;align-items:center;gap:6px"><span style="width:13px;height:13px;border-radius:3px;background:#0f9d77;display:inline-block"></span>亞洲團隊</span>
    <span id="sync" style="margin-left:auto;color:var(--muted);font-size:12px"></span>
  </div>
  <div class="toolbar">
    <span id="chips"></span>
    <span style="flex:1"></span>
    <button onclick="expand(true)">全部展開</button>
    <button onclick="expand(false)">全部收合</button>
    <button onclick="loadState(true)">重新整理</button>
    <button onclick="openHistory()">歷史週報</button>
    <button onclick="syncNow('us','美國企場')" title="從美國企場 Google Sheet 重新讀取項目">重讀美國企場</button>
    <button onclick="syncNow('asia','亞洲企劃')" title="從亞洲企劃 Google Sheet 重新讀取項目">重讀亞洲企劃</button>
  </div>
  <div id="board"></div>
  <div id="history" style="display:none;margin-top:16px"></div>
</div>
<footer>市場組工作進度追蹤 · 資料整併自美國企場 / 亞洲企劃 / Arthur 三表（唯讀匯入，未更動來源）· 進度由 Cloudflare 後端即時共用</footer>

<script>
const API='https://work-progress-api.oldrd4-market.workers.dev';
const TEAM=[
  {name:'美國',cls:'us',color:'#2563eb',members:['聿緯','張譯','貞貞','Abbie','Arthur']},
  {name:'亞洲',cls:'asia',color:'#0f9d77',members:['皓皓','Kevin']},
];
const STXT=['未開始','進行中','已完成'];
const statusOf=p=>p>=100?2:p>0?1:0;
const clamp=v=>Math.max(0,Math.min(100,parseInt(v)||0));
const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

let DATA={week:'',items:[]};
let filter='all';
let REG={}, PERSON={};

function setSync(m){const s=document.getElementById('sync');if(s)s.textContent=m;}

async function loadState(manual){
  try{
    const r=await fetch(API+'/api/state',{cache:'no-store'});
    const nd=await r.json();
    const structural = manual || nd.week!==DATA.week || nd.items.length!==DATA.items.length || !Object.keys(REG).length;
    DATA=nd;
    if(structural) render(); else applyInPlace();
    const t=new Date();
    setSync('已同步 '+String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0'));
  }catch(e){ setSync('連線失敗，稍後自動重試'); }
}

function render(){
  document.getElementById('cycle').textContent='本週工作週期 '+(DATA.week||'');
  let chips='<span class="chip '+(filter==='all'?'active':'')+'" onclick="setF(\'all\')">全部</span>';
  TEAM.forEach(t=>t.members.forEach(m=>{ chips+='<span class="chip '+(filter===m?'active':'')+'" onclick="setF(\''+m+'\')">'+m+'</span>'; }));
  document.getElementById('chips').innerHTML=chips;

  const board=document.getElementById('board');board.innerHTML='';REG={};PERSON={};
  TEAM.forEach(t=>{
    t.members.forEach(member=>{
      if(filter!=='all'&&filter!==member) return;
      const rows=DATA.items.filter(it=>it.team===t.name&&it.owner===member);
      if(rows.length) renderPerson(t,member,rows);
    });
    const known=t.members;
    const un=DATA.items.filter(it=>it.team===t.name&&!known.includes(it.owner));
    if(un.length&&filter==='all') renderPerson(t,'(未認領)',un);
  });
  updateOverall();
}

function avgOf(keys){let s=0;keys.forEach(k=>{const it=DATA.items.find(x=>x.id===k);s+=it?(it.progress||0):0;});return keys.length?Math.round(s/keys.length):0;}

function renderPerson(t,member,rows){
  const board=document.getElementById('board');
  const el=document.createElement('div');el.className='person';
  const initial=member.replace(/[()]/g,'').slice(0,2);
  el.innerHTML=`
    <div class="phead" onclick="this.parentNode.querySelector('.items').classList.toggle('hide')">
      <span class="avatar" style="background:${t.color}">${esc(initial)}</span>
      <span class="pname">${esc(member)}</span>
      <span class="teamtag ${t.cls}">${esc(t.name)}</span>
      <span class="pmeta">
        <span>${rows.length} 項</span>
        <span class="pbar"><i class="p-bar" style="width:0%;background:${t.color}"></i></span>
        <span class="p-pct" style="font-weight:600;color:var(--txt)">0%</span>
      </span>
    </div>`;
  const tbl=document.createElement('table');tbl.className='items';
  tbl.innerHTML=`<thead><tr>
    <th>標籤</th><th>工作項目</th><th class="colH">工時</th><th class="colP">完成度</th>
    <th class="colS">狀態</th><th class="colU">最後更新</th></tr></thead><tbody></tbody>`;
  const tb=tbl.querySelector('tbody');const keys=[];
  rows.forEach(it=>{
    keys.push(it.id);const p=it.progress||0;const h=(it.hours!=null?it.hours:'');
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><span class="tag">${esc(it.tag||'-')}</span></td>
      <td><div class="title">${esc(it.title)}</div>${it.note?`<div class="note">${esc(it.note)}</div>`:''}</td>
      <td><input class="hrs" type="number" min="0" step="0.5" value="${h}" placeholder="-"></td>
      <td><div class="prog">
            <input class="rng" type="range" min="0" max="100" step="5" value="${p}">
            <input class="num" type="number" min="0" max="100" value="${p}">
          </div></td>
      <td><span class="status s${statusOf(p)}">${STXT[statusOf(p)]}</span></td>
      <td><span class="upd">${esc(it.updated||'—')}</span></td>`;
    const rng=tr.querySelector('.rng'),num=tr.querySelector('.num'),hrs=tr.querySelector('.hrs'),stEl=tr.querySelector('.status'),updEl=tr.querySelector('.upd');
    REG[it.id]={member,rng,num,hrs,stEl,updEl};
    rng.addEventListener('input',()=>{const v=clamp(rng.value);num.value=v;liveStatus(it.id,v);});
    rng.addEventListener('change',()=>commit(it.id,{progress:clamp(rng.value)}));
    num.addEventListener('change',()=>{const v=clamp(num.value);rng.value=v;commit(it.id,{progress:v});});
    hrs.addEventListener('change',()=>commit(it.id,{hours:hrs.value}));
    tb.appendChild(tr);
  });
  PERSON[member]={bar:el.querySelector('.p-bar'),pct:el.querySelector('.p-pct'),keys};
  el.appendChild(tbl);board.appendChild(el);
  updatePerson(member);
}

function liveStatus(id,v){const R=REG[id];if(!R)return;const s=statusOf(v);R.stEl.className='status s'+s;R.stEl.textContent=STXT[s];
  const it=DATA.items.find(x=>x.id===id);if(it)it.progress=v;updatePerson(R.member);updateOverall();}

async function commit(id,patch){
  const it=DATA.items.find(x=>x.id===id);if(!it)return;
  if(patch.progress!=null)it.progress=patch.progress;
  if(patch.hours!==undefined)it.hours=patch.hours===''?null:parseFloat(patch.hours);
  const R=REG[id];if(R){const s=statusOf(it.progress||0);R.stEl.className='status s'+s;R.stEl.textContent=STXT[s];}
  updatePerson(R?R.member:null);updateOverall();
  try{
    const r=await fetch(API+'/api/update',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.assign({id},patch))});
    const res=await r.json();
    if(res&&res.item&&R)R.updEl.textContent=res.item.updated||'—';
    setSync('已儲存');
  }catch(e){ setSync('儲存失敗，請重試'); }
}

function applyInPlace(){
  DATA.items.forEach(it=>{
    const R=REG[it.id];if(!R)return;
    const editing=document.activeElement&&(document.activeElement===R.rng||document.activeElement===R.num||document.activeElement===R.hrs);
    if(editing)return;
    const p=it.progress||0;
    if(+R.rng.value!==p)R.rng.value=p;
    if(+R.num.value!==p)R.num.value=p;
    const s=statusOf(p);R.stEl.className='status s'+s;R.stEl.textContent=STXT[s];
    R.updEl.textContent=it.updated||'—';
    R.hrs.value=(it.hours!=null?it.hours:'');
  });
  Object.keys(PERSON).forEach(updatePerson);updateOverall();
}

function updatePerson(member){const P=PERSON[member];if(!P)return;const a=avgOf(P.keys);P.bar.style.width=a+'%';P.pct.textContent=a+'%';}
function updateOverall(){const a=DATA.items.length?Math.round(DATA.items.reduce((s,it)=>s+(it.progress||0),0)/DATA.items.length):0;
  document.getElementById('ovpct').textContent=a+'%';document.getElementById('ovbar').style.width=a+'%';}

function setF(m){filter=m;render();}
function expand(open){document.querySelectorAll('.items').forEach(e=>e.classList.toggle('hide',!open));}

async function syncNow(src,label){
  if(!confirm('要從「'+label+'」Google Sheet 重新讀取項目嗎？\n會更新項目清單，已填的完成度會保留。'))return;
  setSync('讀取 '+label+' 中…');
  try{
    const r=await fetch(API+'/api/sync?src='+src,{method:'POST'});
    const j=await r.json();
    if(j.ok){ setSync(label+' 已更新（'+(j.count||0)+' 項）'); await loadState(true); }
    else setSync('讀取失敗：'+(j.error||''));
  }catch(e){ setSync('讀取失敗，請重試'); }
}

async function openHistory(){
  const box=document.getElementById('history');box.style.display='block';box.innerHTML='載入歷史中…';
  try{
    const j=await (await fetch(API+'/api/history')).json();
    if(!j.weeks||!j.weeks.length){box.innerHTML='<div class="hint">目前還沒有歷史週次。每週三 00:00 換頁後，上一週會封存到這裡。</div>';return;}
    const opts=j.weeks.map(w=>`<option value="${esc(w)}">${esc(w)}</option>`).join('');
    box.innerHTML=`<div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
      <span style="font-weight:500">歷史週報：</span>
      <select id="histSel" onchange="showHistory(this.value)">${opts}</select>
      <button onclick="document.getElementById('history').style.display='none'">關閉</button></div>
      <div id="histBody"></div>`;
    showHistory(j.weeks[0]);
  }catch(e){box.innerHTML='<div class="hint">讀取歷史失敗。</div>';}
}
async function showHistory(week){
  const body=document.getElementById('histBody');body.textContent='載入中…';
  try{
    const snap=await (await fetch(API+'/api/history/'+encodeURIComponent(week))).json();
    const rows=snap.items.map(it=>`<tr>
      <td style="padding:8px 12px"><span class="tag">${esc(it.tag||'-')}</span></td>
      <td style="padding:8px 12px">${esc(it.title)} <span style="color:var(--muted);font-size:12px">· ${esc(it.owner)}</span></td>
      <td style="padding:8px 12px;text-align:center">${it.hours!=null?it.hours+'h':'-'}</td>
      <td style="padding:8px 12px">${it.progress||0}%</td></tr>`).join('');
    body.innerHTML=`<div style="border:0.5px solid var(--line);border-radius:8px;overflow:hidden">
      <table style="width:100%"><thead><tr>
      <th style="padding:8px 12px">標籤</th><th style="padding:8px 12px">工作項目</th>
      <th style="padding:8px 12px">工時</th><th style="padding:8px 12px">完成度</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  }catch(e){body.textContent='讀取失敗';}
}

loadState();
setInterval(()=>loadState(false),20000);
</script>
</body>
</html>
