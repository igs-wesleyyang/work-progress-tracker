<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>市場組工作進度追蹤</title>
<style>
  :root{
    --bg:#f6f7f9; --card:#fff; --line:#e4e7ec; --txt:#1f2430; --muted:#6b7280;
    --us:#2563eb; --us-bg:#e8f0fe; --asia:#0f9d77; --asia-bg:#dcf5ec;
    --ok:#16a34a; --ok-bg:#dcfce7; --doing:#d97706; --doing-bg:#fef3c7; --none:#9ca3af; --none-bg:#f1f3f5;
    --radius:12px;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#15171c; --card:#1f232b; --line:#333a45; --txt:#e6e8ec; --muted:#9aa3af;
      --us-bg:#1e2c4a; --asia-bg:#143a30; --ok-bg:#16361f; --doing-bg:#3a2e10; --none-bg:#262a32; }
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--bg);color:var(--txt);font-size:15px;line-height:1.5}
  header{position:sticky;top:0;z-index:5;background:var(--card);border-bottom:1px solid var(--line);
    padding:14px 20px;display:flex;flex-wrap:wrap;gap:12px 24px;align-items:center;justify-content:space-between}
  h1{font-size:18px;margin:0;font-weight:600}
  .cycle{font-size:13px;color:var(--muted)}
  .overall{display:flex;align-items:center;gap:10px;font-size:13px}
  .bigpct{font-size:22px;font-weight:700}
  .wrap{max-width:1100px;margin:0 auto;padding:18px 20px 60px}
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
  .toolbar button,.toolbar select{font:inherit;padding:7px 12px;border:1px solid var(--line);
    background:var(--card);color:var(--txt);border-radius:8px;cursor:pointer}
  .toolbar button:hover{border-color:var(--muted)}
  .chip{padding:4px 10px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--line);background:var(--card)}
  .chip.active{background:var(--txt);color:var(--bg);border-color:var(--txt)}
  .person{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
  .phead{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none}
  .avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-weight:600;font-size:13px;color:#fff;flex:0 0 auto}
  .pname{font-weight:600}
  .teamtag{font-size:11px;padding:2px 8px;border-radius:6px}
  .teamtag.us{background:var(--us-bg);color:var(--us)} .teamtag.asia{background:var(--asia-bg);color:var(--asia)}
  .pmeta{margin-left:auto;display:flex;align-items:center;gap:14px;font-size:13px;color:var(--muted)}
  .pbar{width:120px;height:8px;border-radius:5px;background:var(--none-bg);overflow:hidden}
  .pbar>i{display:block;height:100%;background:var(--us)}
  table{width:100%;border-collapse:collapse}
  .items{border-top:1px solid var(--line)}
  th,td{text-align:left;padding:9px 12px;font-size:13.5px;border-top:1px solid var(--line);vertical-align:top}
  th{font-size:12px;color:var(--muted);font-weight:500;background:transparent}
  .tag{font-size:11px;padding:2px 7px;border-radius:6px;background:var(--none-bg);color:var(--muted);white-space:nowrap}
  .title{font-weight:500}
  .note{color:var(--muted);font-size:12px;margin-top:2px}
  .status{font-size:11px;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .s0{background:var(--none-bg);color:var(--none)} .s1{background:var(--doing-bg);color:var(--doing)} .s2{background:var(--ok-bg);color:var(--ok)}
  .prog{display:flex;align-items:center;gap:8px}
  .prog input[type=range]{width:90px}
  .prog input[type=number]{width:52px;font:inherit;padding:3px 5px;border:1px solid var(--line);border-radius:6px;background:var(--bg);color:var(--txt)}
  .upd{font-size:11px;color:var(--muted);white-space:nowrap}
  .hrs{width:46px;font:inherit;padding:3px 5px;border:1px solid var(--line);border-radius:6px;background:var(--bg);color:var(--txt)}
  .colH{width:60px} .colT{width:70px} .colP{width:170px} .colS{width:70px} .colU{width:84px}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:20px}
  .hint{background:var(--doing-bg);color:var(--doing);font-size:12px;padding:8px 12px;border-radius:8px;margin-bottom:14px}
</style>
</head>
<body>
<header>
  <div>
    <h1>市場組工作進度追蹤</h1>
    <div class="cycle" id="cycle"></div>
  </div>
  <div class="overall">
    <span>全組完成度</span>
    <div class="pbar" style="width:160px"><i id="ovbar"></i></div>
    <span class="bigpct" id="ovpct">0%</span>
  </div>
</header>

<div class="wrap">
  <div class="hint">提示：進度與工時填寫後會自動存到「這台瀏覽器」。要與他人同步、或啟用 Telegram 提醒，需後端版本（第二階段）。可用右側「匯出 JSON」備份/交接。</div>
  <div class="toolbar">
    <span id="chips"></span>
    <span style="flex:1"></span>
    <button onclick="expand(true)">全部展開</button>
    <button onclick="expand(false)">全部收合</button>
    <button onclick="exportJSON()">匯出 JSON</button>
    <button onclick="document.getElementById('imp').click()">匯入 JSON</button>
    <input id="imp" type="file" accept="application/json" style="display:none" onchange="importJSON(this)">
  </div>
  <div id="board"></div>
</div>
<footer>市場組工作進度追蹤 · 資料來源整併自美國企場 / 亞洲企劃 / Arthur 三表（唯讀匯入，未更動來源）</footer>

<script>

  ['美國','聿緯','中艦','主題活動任務',null,'美國戰神500'],
  ['美國','聿緯','大玩咖','端午養成主題活動第三週數值',null,'07/01~07/07'],
  ['美國','聿緯','大玩咖','淘氣鯊勳章主題活動送審數值',null,''],
  // ── 張譯 ──
  ['美國','張譯','SSS','AM 負責項目',null,'Casimba、GameTech、中國廠商、Dara'],
  ['美國','張譯','SSS','合約/客戶資料/法規追蹤',null,''],

  // ── 貞貞 (Chloe) ──
  ['美國','貞貞','SSS','AM 負責項目',null,'Patrianna、Blazesoft'],
  ['美國','貞貞','SSS','財務對帳',null,''],
  ['美國','貞貞','SSS','數據報告',null,'日報 + 海外報告'],
  ['美國','貞貞','SSS','海外會議報告',null,'6/30 海外會議，週四下午看報告'],
  ['美國','貞貞','SSS','站台流量 / 市場動態追蹤',null,''],
  // ── Abbie ──
  ['美國','Abbie','賽馬','資訊站建立',null,'網站結構與內文規劃'],
  ['美國','Abbie','賽馬','網紅資源與行銷討論',null,''],
  ['美國','Abbie','賽馬','白牌商瞭解',null,'HP約會議中｜PS評估完成｜AW評估完成'],
  ['美國','Abbie','賽馬','遊戲商 AM 負責項目',null,'Horseplay、Potent Systems、AmWest'],
  ['美國','Abbie','賽馬','遊戲商合約簽立 (TaDaUS)',null,'HP等回簽｜PS等亞瑟改｜AW等回簽'],
  ['美國','Abbie','賽馬','遊戲商財務對帳',null,'HP催帳款｜PS尚未收款｜AW等回簽'],
  ['美國','Abbie','SSS','AM 負責項目',null,'Alea、Legendz'],
  // ── Arthur (亞瑟) ──
  ['美國','Arthur','SSS','新廠商開發',null,''],
  ['美國','Arthur','SSS','合約與相關資料補齊',null,''],
  ['美國','Arthur','賽馬','廠商溝通項目與追蹤',null,''],
  ['美國','Arthur','OC','EM 溝通項目與追蹤',null,'MPA'],
  ['美國','Arthur','OC','站台商溝通',null,'建群推進、遊戲上線時間確認'],
  ['美國','Arthur','其他','美國銀行帳戶',null,''],
  ['美國','Arthur','其他','美國公司',null,''],
  // ── 亞洲 · 皓皓 ──
  ['亞洲','皓皓','企劃','Z Gaming Demo',2,''],
  ['亞洲','皓皓','會議','Demo 會前討論',1,''],
  ['亞洲','皓皓','企劃','系統商 / 營運商競品研究',5,''],
  ['亞洲','皓皓','企劃','菲律賓合規執照資料查詢',4,''],
  ['亞洲','皓皓','企劃','主題活動自動化工具規劃',4,''],
  ['亞洲','皓皓','營運','營運社團報告',4,''],
  ['亞洲','皓皓','會議','代理商會議',1,''],
  ['亞洲','皓皓','營運','每日平台數據',5,''],
  ['亞洲','皓皓','H5','H5 即時活動設定',2,''],
  ['亞洲','皓皓','H5','H5 Telegram 社群維護',2,''],
  ['亞洲','皓皓','H5','H5 行銷資源製作 & 發文設定',4,''],
  ['亞洲','皓皓','例行','週二例行測試',2,'H5 測試'],
  ['亞洲','皓皓','例行','週三維護測試',2,'H5 測試'],
  ['亞洲','皓皓','例行','例行會議',2,'早會/工作會議/策略會議/工作會前會'],
  ['亞洲','皓皓','例行','剩餘時間',0,''],
  // ── 亞洲 · Kevin ──
  ['亞洲','Kevin','飛鷹','大玩咖交接',16,'財會遞延文件/數值更新表單巨集/發文公告工具/客服文件/VIP Q群活動'],
  ['亞洲','Kevin','主活動','【主】端午養成主題活動第三週數值 07/01~07/07',2,'數值設定、公告設定'],
  ['亞洲','Kevin','主活動','【主】BINGO 活動工具功能新增與優化',1.5,'功能驗證'],
  ['亞洲','Kevin','主活動','【主】DWK 七夕情緣主題活動送審數值＆集字換皮＆資源 ingame',2,'協助飛鷹'],
  ['亞洲','Kevin','主活動','【主】IR & B7 網頁活動設定',1.5,'活動數值設定、虛寶卡資源更新'],
  ['亞洲','Kevin','主活動','IR & B7 活動 / 禮包數值調整',1.5,'數據追蹤、調整'],
  ['亞洲','Kevin','主活動','IR & B7 主題活動數值更新',1,'實體獎白名單撈取、掉落物權重調整'],
  ['亞洲','Kevin','例行','例行廳館排序調整',1,''],
  ['亞洲','Kevin','例行','例行 APP 推播',1.5,''],
  ['亞洲','Kevin','例行','週二例行測試',3,''],
  ['亞洲','Kevin','例行','週三維護測試',2,''],
  ['亞洲','Kevin','例行','例行會議',1,''],
  ['亞洲','Kevin','例行','剩餘時間',6,''],
];

/* ===== 工具 ===== */
function cycle(d){d=d||new Date();const day=d.getDay();const diff=(day-3+7)%7;
  const s=new Date(d);s.setDate(d.getDate()-diff);s.setHours(0,0,0,0);
  const e=new Date(s);e.setDate(s.getDate()+6);return{s,e};}
const f=d=>`${d.getMonth()+1}/${d.getDate()}`;
const STKEY='workTracker.v1';
let store=JSON.parse(localStorage.getItem(STKEY)||'{}'); // id -> {p, h, u}
let filter='all';

function id(r,i){return i+'_'+r[1]+'_'+r[3];}
function save(){localStorage.setItem(STKEY,JSON.stringify(store));}
function statusOf(p){return p>=100?2:p>0?1:0;}
const STXT=['未開始','進行中','已完成'];

function render(){
  const c=cycle();
  document.getElementById('cycle').textContent=`本週工作週期 ${c.s.getFullYear()}/${f(c.s)}(三) ~ ${f(c.e)}(二)`;
  // chips
  let chips='<span class="chip '+(filter==='all'?'active':'')+'" onclick="setF(\'all\')">全部</span>';
  Object.keys(TEAMS).forEach(t=>{TEAMS[t].members.forEach(m=>{
    chips+=`<span class="chip ${filter===m?'active':''}" onclick="setF('${m}')">${m}</span>`;});});
  document.getElementById('chips').innerHTML=chips;

  // group by team -> member
  const board=document.getElementById('board');board.innerHTML='';
  let ovSum=0,ovN=0;
  Object.keys(TEAMS).forEach(team=>{
    TEAMS[team].members.forEach(member=>{
      const rows=SEED.map((r,i)=>({r,i})).filter(x=>x.r[0]===team && (x.r[1]===member || (x.r[1]===''&&false)));
      // 未認領（亞洲空白）歸到該團隊第一個顯示的虛擬人
      if(!rows.length) return;
      if(filter!=='all' && filter!==member) return;
      renderPerson(board,team,member,rows,v=>{ovSum+=v.sum;ovN+=v.n;});
    });
    // 未認領項目
    const un=SEED.map((r,i)=>({r,i})).filter(x=>x.r[0]===team && x.r[1]==='');
    if(un.length && (filter==='all')) renderPerson(board,team,'(未認領)',un,v=>{ovSum+=v.sum;ovN+=v.n;});
  });
  const ov=ovN?Math.round(ovSum/ovN):0;
  document.getElementById('ovpct').textContent=ov+'%';
  document.getElementById('ovbar').style.width=ov+'%';
}

function renderPerson(board,team,member,rows,acc){
  const tcls=TEAMS[team].cls,tcolor=TEAMS[team].color;
  let sum=0;rows.forEach(({r,i})=>{const st=store[id(r,i)]||{};sum+=(st.p||0);});
  const avg=Math.round(sum/rows.length);
  acc({sum:rows.reduce((a,{r,i})=>a+((store[id(r,i)]||{}).p||0),0),n:rows.length});

  const el=document.createElement('div');el.className='person';
  const initial=member.replace(/[()]/g,'').slice(0,2);
  el.innerHTML=`
    <div class="phead" onclick="this.parentNode.querySelector('.items').classList.toggle('hide')">
      <span class="avatar" style="background:${tcolor}">${initial}</span>
      <span class="pname">${member}</span>
      <span class="teamtag ${tcls}">${team}</span>
      <span class="pmeta">
        <span>${rows.length} 項</span>
        <span class="pbar"><i style="width:${avg}%;background:${tcolor}"></i></span>
        <span style="font-weight:600;color:var(--txt)">${avg}%</span>
      </span>
    </div>`;
  const tbl=document.createElement('table');tbl.className='items';
  tbl.innerHTML=`<thead><tr>
    <th>標籤</th><th>工作項目</th><th class="colH">工時</th><th class="colP">完成度</th>
    <th class="colS">狀態</th><th class="colU">最後更新</th></tr></thead><tbody></tbody>`;
  const tb=tbl.querySelector('tbody');
  rows.forEach(({r,i})=>{
    const key=id(r,i);const st=store[key]||{};const p=st.p||0;const h=(st.h!=null?st.h:r[4]);
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><span class="tag">${r[2]||'-'}</span></td>
      <td><div class="title">${r[3]}</div>${r[5]?`<div class="note">${r[5]}</div>`:''}</td>
      <td><input class="hrs" type="number" min="0" step="0.5" value="${h!=null?h:''}" placeholder="-"
            onchange="setH('${key}',this.value)"></td>
      <td><div class="prog">
            <input type="range" min="0" max="100" step="5" value="${p}" oninput="setP('${key}',this.value,this)">
            <input type="number" min="0" max="100" value="${p}" onchange="setP('${key}',this.value,this)">
          </div></td>
      <td><span class="status s${statusOf(p)}">${STXT[statusOf(p)]}</span></td>
      <td><span class="upd">${st.u||'—'}</span></td>`;
    tb.appendChild(tr);
  });
  el.appendChild(tbl);board.appendChild(el);
}

function nowStr(){const d=new Date();return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function setP(key,v,node){v=Math.max(0,Math.min(100,parseInt(v)||0));
  store[key]=store[key]||{};store[key].p=v;store[key].u=nowStr();save();render();}
function setH(key,v){store[key]=store[key]||{};store[key].h=v===''?null:parseFloat(v);save();}
function setF(m){filter=m;render();}
function expand(open){document.querySelectorAll('.items').forEach(e=>e.classList.toggle('hide',!open));}
function exportJSON(){const blob=new Blob([JSON.stringify(store,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='work-progress-'+new Date().toISOString().slice(0,10)+'.json';a.click();}
function importJSON(inp){const file=inp.files[0];if(!file)return;const rd=new FileReader();
  rd.onload=e=>{try{store=JSON.parse(e.target.result);save();render();alert('匯入完成');}catch(x){alert('檔案格式錯誤');}};
  rd.readAsText(file);}
const style=document.createElement('style');style.textContent='.items.hide{display:none}';document.head.appendChild(style);
render();
</script>
</body>
</html>
